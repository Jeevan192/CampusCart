<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - CampusCart</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="auth-body">
  <nav class="navbar">
    <div class="nav-left">
      <a class="brand" href="index.html" aria-label="CampusCart Home">
        <span class="logo-mark" aria-hidden="true"></span>
        <h1 class="logo">CampusCart</h1>
      </a>
    </div>
    <div class="nav-links">
      <button id="themeToggle" class="btn btn-ghost" type="button" aria-label="Toggle theme">🌙</button>
      <a href="signup.html">Sign Up</a>
    </div>
  </nav>

  <main class="auth-shell">
    <section class="auth-card">
      <header class="auth-head">
        <h2>Welcome back</h2>
        <p class="muted">Login to continue to CampusCart.</p>
      </header>

      <form id="loginForm" class="auth-form" novalidate>
        <label class="field">
          <span>Email</span>
          <input type="email" id="loginEmail" placeholder="name@college.edu" autocomplete="email" required />
        </label>

        <label class="field">
          <span>Password</span>
          <div class="password-wrap">
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required />
            <button class="icon-btn" id="toggleLoginPassword" type="button" aria-label="Toggle password visibility">👁</button>
          </div>
        </label>

        <button class="btn btn-primary" type="submit">Login</button>

        <p class="muted small">
          New user? <a href="signup.html">Create an account</a>
        </p>
      </form>
    </section>
  </main>

  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
